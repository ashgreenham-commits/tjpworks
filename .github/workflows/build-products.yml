name: Build products.json

on:
  push:
    paths:
      - '_products/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install js-yaml
        run: npm install js-yaml

      - name: Generate products.json
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const yaml = require('js-yaml');

          const dir = '_products';
          const files = fs.readdirSync(dir).filter(f => f.endsWith('.md'));
          const products = [];

          files.forEach(file => {
            const content = fs.readFileSync(path.join(dir, file), 'utf8');

            const match = content.match(/^---\r?\n([\s\S]*?)\r?\n---/);
            if (!match) {
              console.log('Skipping ' + file + ' - no frontmatter found');
              return;
            }

            let data;
            try {
              data = yaml.load(match[1]);
            } catch(e) {
              console.log('Skipping ' + file + ' - YAML parse error: ' + e.message);
              return;
            }

            const str = (val) => (val !== undefined && val !== null) ? String(val).trim() : '';

            let years = [];
            if (data.years) {
              years = String(data.years).split(',').map(y => parseInt(y.trim())).filter(n => !isNaN(n));
            }

            let models = [];
            if (data.models) {
              models = String(data.models).split(',').map(m => m.trim()).filter(Boolean);
            }

            let images = [];
            if (Array.isArray(data.images)) {
              images = data.images.map(i => str(i)).filter(Boolean);
            }

            let description = str(data.description);
            if (description === '|-' || description === '|') description = '';

            products.push({
              id: file.replace('.md', ''),
              title: str(data.title),
              brand: str(data.brand),
              price: parseFloat(data.price) || 0,
              original_price: data.original_price ? parseFloat(data.original_price) : null,
              compatibility: str(data.compatibility),
              description: description,
              category: str(data.category),
              make: str(data.make),
              years: years,
              models: models,
              stock: str(data.stock) || 'uk',
              badge: data.badge ? str(data.badge) : null,
              featured: data.featured === true || data.featured === 'true',
              image: str(data.image),
              images: images,
              emoji: str(data.emoji) || '⚙️',
            });

            console.log('Parsed: ' + file + ' | image: ' + str(data.image) + ' | extra images: ' + images.length);
          });

          fs.writeFileSync('products.json', JSON.stringify(products, null, 2));
          console.log('Done - built products.json with ' + products.length + ' products');
          "

      - name: Commit products.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add products.json
          git diff --staged --quiet || git commit -m "Auto: rebuild products.json"
          git pull --rebase && git push
